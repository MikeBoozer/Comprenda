# Copy this file to ~/.snowflake/config.toml (Mac/Linux)
# or %USERPROFILE%\.snowflake\config.toml (Windows)
# and fill in your account identifier and credentials.

default_connection_name = "default"

[connections.default]
account = "your_account_locator.us-west-2.aws"   # find in Snowflake UI, top-left
user = "YOUR_USERNAME"
# Choose ONE auth method:

# Option A — password (simplest for trial)
password = "YOUR_PASSWORD"

# Option B — key-pair (recommended for production)
# private_key_path = "C:/Users/you/.ssh/snowflake_rsa_key.p8"

role = "ACCOUNTADMIN"
warehouse = "NUANCE_DEV_WH"
database = "NUANCE_DB"
schema = "OUTPUTS"
