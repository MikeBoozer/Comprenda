name: app_environment
channels:
  - snowflake
dependencies:
  # Do NOT pin a python version: SiS / native-app Streamlit accepts only specific
  # runtimes (3.11 fails package resolution, 3.12 is "not supported" here). Omitting
  # python lets the platform use its default supported runtime, which still provides
  # the snowflake-channel packages below.
  - pandas
  - numpy
  - pydeck
  # Pin >=1.36 for the st.Page / st.navigation multipage API (comprenda_app.py).
  # Unpinned resolves to an old snowflake-channel build that lacks st.Page. 1.44.1
  # is in the channel and predates the use_container_width deprecation (~1.49).
  - streamlit=1.44.1
  - snowflake-snowpark-python
  - altair
